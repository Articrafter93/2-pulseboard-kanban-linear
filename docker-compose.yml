services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_NAME=Pulseboard
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_REALTIME_SERVICE_URL=http://localhost:4001
      - NEXT_PUBLIC_AUTH_PROVIDER=mock
      - REALTIME_SERVICE_URL=http://localhost:4001
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://pulseboard:pulseboard@db:5432/pulseboard?schema=public
      - DIRECT_URL=postgresql://pulseboard:pulseboard@db:5432/pulseboard?schema=public
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-sk_test_replace_me}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_replace_me}
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=/signin
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=/signup
      - RATE_LIMIT_API_WINDOW_MS=60000
      - RATE_LIMIT_API_MAX=120
      - RATE_LIMIT_SOCKET_WINDOW_MS=60000
      - RATE_LIMIT_SOCKET_MAX=90
    depends_on:
      - redis
      - realtime
      - db

  realtime:
    build:
      context: ./realtime-service
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    volumes:
      - ./realtime-service:/service
      - /service/node_modules
    environment:
      - NODE_ENV=development
      - REALTIME_PORT=4001
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - RATE_LIMIT_SOCKET_WINDOW_MS=60000
      - RATE_LIMIT_SOCKET_MAX=90
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "56379:6379"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pulseboard
      - POSTGRES_PASSWORD=pulseboard
      - POSTGRES_DB=pulseboard
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
