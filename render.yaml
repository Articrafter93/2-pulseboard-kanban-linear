services:
  - type: web
    name: pulseboard-realtime-service
    runtime: node
    rootDir: realtime-service
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: REALTIME_PORT
        value: 10000
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RATE_LIMIT_SOCKET_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_SOCKET_MAX
        value: 90
